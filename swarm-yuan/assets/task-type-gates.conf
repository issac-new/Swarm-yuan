# task-type-gates.conf —— 任务类型 → 门禁集映射（WP-P4）
#
# 任务类型维度与 spec 规模维度（简单/标准/完整）正交：
#   - 任务类型决定门禁子集（哪些门禁跑/豁免）
#   - spec 规模决定档位（--all/--all-full/--all-full+--shift-left）
#   - 两者取更重档（质量优先偏置，决策 18）
#
# 任务类型 7 类（对齐用户级 AGENTS.md 分支命名）：
#   feature / fix / refactor / chore / docs / test / exp
#
# 用法（AI 在 /spec 命令时按本表判定）：
#   1. 从分支名或用户意图判定任务类型
#   2. 取 TASK_TYPE_<type> 的门禁集
#   3. 再按 spec 规模判定档位（detect-spec-scale.sh）
#   4. 两者取并集（更重档）
#
# 约定：
#   - "无豁免" = 全部门禁按规模档跑
#   - "豁免 §14-§18" = spec §14-§18 认知/辩证/领域段可免（--cognition 不强制）
#   - "豁免 spec 全段" = spec 文档可免，直接进 plan 阶段
#   - compliance 档项目无"简单任务"豁免（决策 18）

# ===== 任务类型 → 门禁集（基础集，规模档在此基础上叠加）=====
# 格式：TASK_TYPE_<type>="<base_gates>"
# base_gates 取值：--all（核心10）/ --all-full（标准27）/ --all-full --shift-left（完整）
# 豁免信息记录在 TASK_EXEMPT_<type>，AI 按需跳过对应 spec 段

# feature：新功能，全流程
TASK_TYPE_feature="--all-full"
TASK_EXEMPT_feature="无豁免"

# fix：bug 修复，简化 spec，复用稳定单元
TASK_TYPE_fix="--all"
TASK_EXEMPT_fix="§14-§18 认知段可免；spec 可简化（只填 §1-§4 + §5.5 + §12）"

# refactor：重构，须复用稳定单元 + 稳定单元差异检测
TASK_TYPE_refactor="--all-full --reuse --stable-diff"
TASK_EXEMPT_refactor="§14-§18 认知段可免"

# chore：杂务（依赖升级/配置调整/格式化），spec 可免
TASK_TYPE_chore="--all"
TASK_EXEMPT_chore="spec 全段可免；直接进 plan"

# docs：文档变更，只跑文档包清单门禁
TASK_TYPE_docs="--docs-pack"
TASK_EXEMPT_docs="其他门禁全免"

# test：测试补充/修复，跑核心 + 左移测试段
TASK_TYPE_test="--all --shift-left"
TASK_EXEMPT_test="§14-§18 认知段可免；spec §19 测试设计段必填"

# exp：实验性探索，不阻塞合入（合入前须转 feature/fix）
TASK_TYPE_exp="--all"
TASK_EXEMPT_exp="合入前须转 feature/fix 正式流程；spec §1 标注「实验性」"

# ===== 规模档叠加规则（detect-spec-scale.sh 推断，与任务类型取并集）=====
# 简单（侵入点≤3 文件，无风险信号）  → --all
# 标准（侵入点 4-10 文件，或含任一风险信号）→ --all-full
# 完整（侵入点>10 文件，或≥2 风险信号，或架构变更）→ --all-full --shift-left
# 风险信号：跨服务 / 公共接口 / 数据模型 / 权限

# ===== 质量优先偏置（决策 18）=====
# - 任务类型与规模档取并集（更重档）
# - 规模不确定按更大规模处理
# - compliance 档项目追加 --compliance-suite，无"简单任务"豁免
# - 公共接口/数据模型/权限改动无"简单"档（强制 ≥ --all-full）

# ===== 一致性断言（self-check 机器执法）=====
# 7 类必须齐全：feature/fix/refactor/chore/docs/test/exp
# 每类必须有 TASK_TYPE_<type> 和 TASK_EXEMPT_<type>
