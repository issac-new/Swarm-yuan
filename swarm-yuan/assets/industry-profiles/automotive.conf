# automotive.conf —— 汽车行业 profile 配置覆盖包（WP-U）
# =============================================================================
# 用法：把本文件整体追加到 precheck.conf 末尾，再按项目实际裁剪——
#   cat assets/industry-profiles/automotive.conf >> <目标 skill>/scripts/precheck.conf
# bash 后赋值覆盖先赋值；占位值（<...>）必须替换为真实路径。
# 姿态约定：未配置的门禁静默跳过；下列安全类门禁启用后 fail-closed；豁免按
# references/standards-compliance.md §F.2 五字段登记，空理由视为无效豁免 → fail；
# --dengbao 例外：四字段（DENGBAO_EXEMPT_FILE：规则id|理由|审批人|日期）。
# 条款依据：references/industry-profile-automotive.md（汽车 profile 立法文档，
#   含条款→门禁映射与差额项；全部 URL 证据访问日期 2026-07-23）。
# 边界：ISO 26262 功能安全评估/ASIL 定级/CSMS 认证属线下外审，本范式不覆盖认证
#   （立法文档 §3 差额项；门禁输出不构成型式认证合规证据）。
# =============================================================================

# ===== 等级保护（--dengbao）=====
# 汽车行业不强制等保：车机/车云/车端软件不必然落入《网络安全法》第 21 条等级保护
# 制度范畴（GB/T 22239-2019 不直接管辖车载 E/E 系统）；车云后端若承载个人信息/关基
# 系统则按通用等保办理，由项目侧自行定级，本 profile 不设默认值。
DENGBAO_LEVEL=""                        # SKIP（汽车不强制等保；车云后端按项目定级另行配置）

# ===== 密码合规（--crypto）=====
# 汽车行业不强制国密：车端 E/E 系统密码应用由 ISO 26262 + 车规密码件（HSM/SE）
# 体系覆盖，不在 GB/T 39786-2021 密评范畴；车云后端若承载个人信息加密义务，
# 由项目侧自行启用 gm profile，本 profile 不设默认值。
CRYPTO_PROFILE=""                      # SKIP（汽车不用国密；车云后端按项目启用）

# ===== 个人信息保护（--privacy + --pia）=====
# 车机/座舱常采集驾驶员/乘客生物特征、轨迹、习惯偏好等可识别个人信息（个保法
# 第 28 条敏感个人信息），是否启用 PII 扫描由项目侧按车型/功能自行决定；本 profile
# 不预设强制值（汽车非个人信息强监管行业，留空 SKIP）。
PRIVACY_SCAN_DIRS=()                   # 留空 SKIP；项目若处理个人生物特征/轨迹须填真实源码目录
AUTHZ_SCAN_DIRS=()                     # 留空 SKIP；车云后端若对外开放 API 须按项目启用
PIA_REQUIRED=0                         # 汽车不强制 PIA；项目处理敏感个人信息时按个保法第 55 条自行启用

# ===== 供应链与软件物料清单（--sbom + --oss-eval）=====
# 依据：UNECE R156（软件更新管理系统 SUMS）要求 OEM 建立软件物料清单与版本管理；
#       GB/T 40855-2024《汽车软件升级通用技术要求》（与 R156 对标，条款号待原文核实）；
#       ISO 26262 Part 8（软件级开发：软件配置/构建/测试可追溯，需求追溯到测试）；
#       GB/T 43848-2024（开源代码安全评价：成分清单/许可证纳入评价体系）。
# 判定：启用后 fail-closed——无工具且无 lockfile → fail；许可证块名单命中 → fail。
SBOM_REQUIRED=1                        # UNECE R156 软件物料清单（车端/车云组件版本可追溯）
SBOM_LICENSE_BLOCKLIST=("GPL-3.0" "AGPL")   # 强 copyleft 进车规商用交付须法务评估；按 OEM 开源政策裁剪
OSS_EVAL_REQUIRED=1                    # GB/T 43848-2024 开源评价四维：来源/安全质量/知识产权/管理

# ===== 交付文档包（--docs-pack）=====
# 依据：GB/T 8567-2006 文档体系；ISO 26262 Part 8 软件级文档（软件需求/设计/测试/
#       验证报告）；GB/T 40855-2024 软件升级技术要求文档（条款号待原文核实）。
# 判定：启用后 fail-closed——缺必备文档 → fail。
DOCS_PACK_PROFILE="gbt8567"
DOCS_PACK_REQUIRED=("软件需求规格说明" "软件设计说明" "软件测试计划" "软件测试报告" "软件用户手册" "软件产品规格说明")

# ===== 发布签名（--release-sign）=====
# 依据：UNECE R156 软件更新完整性（OTA 包签名/校验，防止篡改与未授权更新）；
#       NIST SP 800-218 PS.2（发布完整性验证机制）；SLSA v1.0 Build L2（签名 provenance）。
# 判定：启用后 fail-closed——产物缺 .sig/.asc/.att/.bundle → fail；cosign 验签失败 → fail。
RELEASE_SIGN_REQUIRED=1                # R156 软件更新完整性签名

# ===== 需求与追溯（--requirements/--rtm）=====
# 依据：ISO 26262 Part 8（软件级开发：需求可追溯到设计/代码/测试，双向追溯）；
#       ISO/IEC/IEEE 29148（需求唯一标识、无待定项、需求↔测试双向追溯）。
# 判定：启用后 fail-closed——spec 含 TBD/待定 → fail；需求条目缺 REQ- 唯一编号 → fail；
#       RTM 矩阵缺失 → fail。
REQUIREMENTS_STRICT=1
REQUIREMENTS_ID_REQUIRED=1
RTM_REQUIRED=1
RTM_MATRIX_REQUIRED=1                  # ISO 26262 需求追溯到测试

# ===== AI 过程信息项（--review-record）=====
# 依据：ISO/IEC 42001 成文信息+可追溯；车规软件 AI 辅助生成代码/测试须留痕可审。
AI_DISCLOSURE_REQUIRED=1               # AI 辅助生成产物带 AI 生成声明+人工复核记录

# ===== 证据留痕 =====
# 依据：UNECE R156 SUMS 审计日志；ISO 26262 Part 8 软件配置/构建记录留存。
GATE_RUNS_DIR=".swarm-yuan/gate-runs"
