# =============================================================================
# medical.conf — 医疗行业推荐配置覆盖包（industry profile: medical）
#
# 用法：生成医疗行业项目 skill 时，将本文件内容追加到 scripts/precheck.conf 末尾
#      （同名标量/数组后定义覆盖先定义；词表类用合并式写法保留基线值）。
# 姿态：与 references/standards-compliance.md §F 一致——未配置静默跳过、启用后 fail-closed；
#      豁免按 §F.2 五字段登记（对象|规则|理由|审批人|日期）。
# 条款依据：references/industry-profile-medical.md §二清单 / §三映射 / §五证据
#      （URL 真实可核，访问日期 2026-07-20）。
# 边界：医疗器械软件（SaMD/SiMD）注册申报场景须外审，本范式不覆盖认证（§E.5 功能安全占位）。
# 兼容性：bash 3.2 可 source（无数组关联、无 declare -A；数组合并用 ${VAR[@]+"${VAR[@]}"} 防护）。
# =============================================================================

# ===== 敏感信息与 PII 扫描（--sensitive / --privacy）=====
# 依据：网络安全法 §21、数据安全法 §27（技术措施）；个保法 §28（医疗健康=敏感个人信息）、
#      §29（单独同意）；GB/T 39725-2020 第 5 章（数据分类分级）；办法 §22（全生命周期）。
SCAN_DIRS=("src")                    # 密钥/连接串扫描目录，按项目实际增删
PRIVACY_SCAN_DIRS=("src")            # 健康医疗标识符扫描目录；启用后 fail-closed（目录全不存在 → fail）
# 病历号/就诊卡号/医保号/健康档案号等标识符 ERE 模式（grep -E 消费）；
# 强制带字段名上下文 + [^0-9A-Za-z]{0,4} 分隔段，兼容全角冒号且压制纯数字误报
PRIVACY_EXTRA_PATTERNS=(${PRIVACY_EXTRA_PATTERNS[@]+"${PRIVACY_EXTRA_PATTERNS[@]}"} \
  "(病历号|病案号|就诊卡号|住院号|门诊号)[^0-9A-Za-z]{0,4}[0-9A-Za-z-]{4,}" \
  "(医保卡号|医保编号|社会保障号码|医保电子凭证号)[^0-9A-Za-z]{0,4}[0-9A-Za-z-]{4,}" \
  "(健康档案号|健康档案编号|居民健康卡号)[^0-9A-Za-z]{0,4}[0-9A-Za-z-]{4,}")
# 敏感字段名固定串词表（grep -F 消费，命中即 fail；测试构造数据走 PRIVACY_EXEMPTIONS 豁免）
PRIVACY_SENSITIVE_KEYWORDS=(${PRIVACY_SENSITIVE_KEYWORDS[@]+"${PRIVACY_SENSITIVE_KEYWORDS[@]}"} \
  "病历号" "病案号" "就诊卡号" "住院号" "门诊号" "医保卡号" "医保编号" "健康档案号" "居民健康卡号")
PRIVACY_EXEMPTIONS=()                # 5 字段：对象|规则|理由|审批人|日期（GB/T 39786「宜」级裁剪论证同构）

# ===== 服务端授权强制（--authz）=====
# 依据：个保法 §29（敏感个人信息处理授权）、办法 §22(四)（严格权限+防越权使用）、
#      互联网医院基本标准（四）（建立数据访问控制信息系统）；
#      CWE-862/863/639/284（CWE Top 25:2025 授权类四弱点，R8 #20）。
AUTHZ_SCAN_DIRS=("src")              # 缺鉴权注解/IDOR/CORS 放行带凭据 → fail（fail-closed）
AUTHZ_EXTRA_PATTERNS=()              # 例：("@Anonymous")——匿名端点 warn 转人工复核

# ===== 审计日志与留痕（--shift-left 可观测性 + gate-runs 证据落盘）=====
# 依据：网安法 §21(三)（网络日志留存不少于六个月）、办法 §22(四)（日志留存、杜绝篡改删除）、
#      互联网诊疗监管细则 §25（全程留痕、可追溯，向省级监管平台开放数据接口）、
#      GB/T 28448-2019（测评证据四要素：指标→对象→实施→判定）。
LOG_CODE_PATTERNS="${LOG_CODE_PATTERNS}\|audit\|AuditLog\|审计"   # 合并式扩展：基线日志模式 + 审计埋点
GATE_RUNS_DIR=".swarm-yuan/gate-runs" # 门禁证据 JSONL 落盘（细则 §25 留痕 + 28448 证据链）

# ===== 加密存储 / 传输（--crypto 国密 profile）=====
# 依据：密码法 + 办法 §15（密码保护措施同步规划/建设/运行）、§22(三)（境内存储+备份+加密）、
#      个保法 §51(三)（加密、去标识化）、等保三级 8.1.4.8（数据保密性，GB/T 22239-2019）。
CRYPTO_PROFILE="gm"                  # GB/T 39786-2021 密评 profile：弱算法 MD5/SHA1/DES/RSA-1024/ECDSA → fail
CRYPTO_SCAN_DIRS=("src")             # 启用 profile 但留空仅 warn 披露 fail-open——医疗场景必须显式配置

# ===== 供应链与现成软件（--sbom）=====
# 依据：GB/T 38674-2020 §8.1（第三方软件使用安全）、办法 §16（第三方链条安全管理）、
#      医疗器械软件注册审查指导原则（2022 年第 9 号）现成软件/SOUP 研究资料要求；
#      OWASP Top 10:2025 A03（软件供应链失效）。
SBOM_REQUIRED=1                      # 启用后 fail-closed：无工具且无 lockfile → fail
SBOM_FORMAT="cyclonedx"              # ECMA-424:2024；漏洞/VEX 一等公民
SBOM_LICENSE_BLOCKLIST=("GPL-3.0" "AGPL")   # 许可证块名单；豁免走 SBOM_LICENSE_EXEMPTIONS（5 字段）

# ===== 需求可追溯（--requirements，配合 SPEC_FILE 启用）=====
# 依据：YY/T 0664-2020（IEC 62304，MOD）需求↔风险↔测试双向追溯、ISO/IEC/IEEE 29148 唯一标识；
#      电子病历分级评价（国卫办医函〔2018〕1079 号）39 项目逐条核查同构。
REQUIREMENTS_STRICT=1                # spec 含 TBD/待定/待明确 → fail
REQUIREMENTS_ID_REQUIRED=1           # 需求条目缺 REQ- 唯一编号 → fail
