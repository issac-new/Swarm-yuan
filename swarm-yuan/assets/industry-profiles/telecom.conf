# telecom.conf —— 电信行业 profile 配置覆盖包（WP-V）
# =============================================================================
# 用法：把本文件整体追加到 precheck.conf 末尾，再按项目实际裁剪——
#   cat assets/industry-profiles/telecom.conf >> <目标 skill>/scripts/precheck.conf
# bash 后赋值覆盖先赋值；占位值（<...>）必须替换为真实路径。
# 姿态约定：未配置的门禁静默跳过；下列安全类门禁启用后 fail-closed；豁免按
# references/standards-compliance.md §F.2 五字段登记，空理由视为无效豁免 → fail；
# --dengbao 例外：四字段（DENGBAO_EXEMPT_FILE：规则id|理由|审批人|日期）。
# 条款依据：references/industry-profile-telecom.md（电信 profile 立法文档，
#   含条款→门禁映射与差额项；全部 URL 证据访问日期 2026-07-23）。
# =============================================================================

# ===== 等级保护（--dengbao）=====
# 依据：《网络安全法》第 21 条（等级保护制度）；GB/T 22239-2019（等保 2.0 基本要求）；
#       电信行业扩展：YD/T 1729-2008《电信网和互联网安全等级保护实施指南》（行业共识，条款号待原文核实）。
# 电信关基系统（核心网/BOSS/网管/计费）原则上等保三级起步；三级起双因子鉴别、
# 安全审计记录字段、剩余信息保护与个人信息保护。
# 判定：启用后 fail-closed——双因子/审计/审计字段/个人信息保护缺口 → fail。
# 豁免：DENGBAO_EXEMPT_FILE 四字段（规则id|理由|审批人|日期）。
DENGBAO_LEVEL="3"                      # 电信关基等保三级起步
DENGBAO_SCAN_DIRS=("<必填：服务端源码目录>")   # 本 profile 必填项（启用但留空 → warn 披露 fail-open 风险）

# ===== 密码合规（--crypto）=====
# 依据：《密码法》2020 +《商用密码管理条例》2023；GB/T 39786-2021（密评）；
#       电信关基/等保三级系统须开展商用密码应用安全性评估。
# 判定：弱算法 MD5/SHA1/DES/RSA-1024/ECDSA 命中 → fail；国密白名单 SM2/SM3/SM4。
CRYPTO_PROFILE="gm"                    # GB/T 39786-2021 密评 profile
CRYPTO_SCAN_DIRS=("<必填：服务端源码目录>")   # 本 profile 必填项

# ===== 个人信息保护（--privacy + --pia）=====
# 依据：《电信和互联网用户个人信息保护规定》（工信部令第 24 号，2013，已核验）；
#       《个人信息保护法》2021 第 55-56 条（PIA 与记录）；GB/T 35273-2020。
# 电信业务经营者直接处理海量用户个人信息（入网实名/通信详单/位置信息），属个人信息强监管。
# 判定：启用后 fail-closed——配置目录全不存在 → fail；PII 命中 → fail；PIA 文档缺失 → fail。
PRIVACY_SCAN_DIRS=("<必填：源码目录>")   # 本 profile 必填项；切勿带占位值上生产
PIA_REQUIRED=1                         # 工信部令第 24 号 + 个保法 55 条：PIA 强制
PIA_DOCS_DIR="docs/privacy"

# ===== 供应链与开源评价（--sbom + --oss-eval）=====
# 依据：GB/T 39204-2022 7.9（关基供应链安全保护）；GB/T 43848-2024（开源代码安全评价）；
#       3GPP TS 33.501（5G 安全架构，网络功能软件供应链安全，行业共识，条款号待原文核实）。
# 判定：启用后 fail-closed——无工具且无 lockfile → fail；许可证块名单命中 → fail。
SBOM_REQUIRED=1
SBOM_LICENSE_BLOCKLIST=("GPL-3.0" "AGPL")
OSS_EVAL_REQUIRED=1

# ===== 交付文档包（--docs-pack）=====
# 依据：GB/T 8567-2006 文档体系；GB/T 28448-2019 测评须提交定级报告/整改方案。
# 判定：启用后 fail-closed——缺必备文档 → fail。
DOCS_PACK_PROFILE="gbt8567"
DOCS_PACK_REQUIRED=("软件需求规格说明" "软件设计说明" "软件测试计划" "软件测试报告" "软件用户手册" "软件产品规格说明")

# ===== 发布签名（--release-sign）=====
# 依据：GB/T 39204-2022 7.9 f)（交付关键环节安全管理）；NIST SP 800-218 PS.2。
# 判定：启用后 fail-closed——产物缺 .sig/.asc/.att/.bundle → fail。
RELEASE_SIGN_REQUIRED=1

# ===== 需求与追溯（--requirements/--rtm）=====
# 依据：ISO/IEC/IEEE 29148（电信运营商集采验收惯例：需求条目唯一编号+双向追溯）。
REQUIREMENTS_STRICT=1
REQUIREMENTS_ID_REQUIRED=1
RTM_REQUIRED=1
RTM_MATRIX_REQUIRED=1

# ===== 证据留痕 =====
# 依据：GB/T 28448-2019 测评证据要素；电信网码号/网络运行日志留存监管惯例。
GATE_RUNS_DIR=".swarm-yuan/gate-runs"
