# finance.conf — 金融行业 profile 配置覆盖包（P3 批次，调研员_P3C）
# =============================================================================
# 用法：把本文件整体追加到 precheck.conf 末尾，再按项目实际裁剪——
#   cat assets/industry-profiles/finance.conf >> <目标 skill>/scripts/precheck.conf
# bash 后赋值覆盖先赋值，故同名变量以本片段为准；占位值（<...>）必须替换为真实路径。
# 姿态约定（与 precheck.conf 头部一致）：未配置的门禁静默跳过；下列安全类门禁
# 启用后 fail-closed；豁免必须按 references/standards-compliance.md §F.2 五字段
# 格式登记（对象|规则|理由|审批人|日期），空理由视为无效豁免 → fail。
# 条款依据：references/industry-profile-finance.md（金融 profile 立法文档，
# 含条款→门禁映射与差额项；全部 URL 证据访问日期 2026-07-20）。
# =============================================================================

# ===== 密码合规（--crypto）=====
# 依据：GB/T 39786-2021 8.4（三级应用和数据安全：身份鉴别、重要数据机密性应采用
#       密码技术）、8.7（三级建设运行：投入运行前须通过密评）；《密码法》2020 +
#       《商用密码管理条例》2023 确立密评制度；人民银行对密码基础设施/金融 IC 卡/
#       网上银行/移动支付/关键信息系统的密码应用要求（R8 §⑪，证据见立法文档 §5-15）。
# 判定：弱算法 MD5/SHA1/DES/RSA-1024/ECDSA 命中 → fail；国密白名单 SM2/SM3/SM4。
CRYPTO_PROFILE="gm"                      # GB/T 39786-2021 密评 profile
# 启用 gm 但留空扫描目录 → warn 披露 fail-open 风险（同 --sensitive 姿态）；须填真实源码目录
CRYPTO_SCAN_DIRS=("<按项目填：服务端源码目录>")

# ===== 个人金融信息保护（--privacy）=====
# 依据：JR/T 0171-2020 第 4 章「个人金融信息概述」（C3/C2/C1 类别划分）与第 6 章
#       安全技术要求（C3 不应共享、转让、公开披露、委托处理；6.1.1 a) 不应委托
#       或授权无金融业相关资质的机构收集 C3、C2 类别信息）；《个人信息保护法》2021 第 51 条（三）
#       （加密、去标识化）；《银行保险机构数据安全管理办法》金规〔2024〕24 号
#       §45（个人身份鉴别数据不得明文存储、传输和展示）、§48（敏感级及以上数据
#       原则上未经脱敏不得进入测试环境）。
# 判定：启用后 fail-closed——配置目录全不存在 → fail；PII 命中 → fail
#       （gate_privacy_pii_found）；切勿带占位值上生产。
PRIVACY_SCAN_DIRS=("<必填：源码目录>" "<必填：测试/夹具目录>")   # 本 profile 必填项
# 内置 ERE 已覆盖 18 位身份证/手机号/16-19 位银行卡（含银联卡）；磁道数据、CVN/CVV2
# 等 C3 鉴别特征串如需追加，用 PRIVACY_EXTRA_PATTERNS（ERE 语法），误报走豁免登记。
PRIVACY_EXTRA_PATTERNS=()
# JR/T 0171-2020 C2/C3 类别敏感词（固定串匹配，忽略大小写）：银行卡号/身份证必含
PRIVACY_SENSITIVE_KEYWORDS=("身份证号" "银行卡号" "支付密码" "交易密码" "CVV2" "短信验证码")
# PRIVACY_EXEMPTIONS 按 §F.2 五字段登记；填写示例见 standards-compliance.md §F.2

# ===== 服务端授权（--authz）=====
# 依据：GB/T 22239-2019 7.1.4.2（访问控制：默认账户清理、最小权限）；
#       《商业银行内部控制指引》银监发〔2014〕40 号第 21 条（授权体系、动态调整）；
#       CWE Top 25:2025 授权类四弱点 CWE-862/863/284/639（R8 §⑨）；
#       JR/T 0068-2020《网上银行系统信息安全通用规范》访问控制要求。
# 判定：缺鉴权注解 / IDOR / CORS 放行带凭据 → fail（启用后 fail-closed）。
AUTHZ_SCAN_DIRS=("<必填：服务端源码目录>")   # 本 profile 必填项（AUTHZ 启用）
AUTHZ_EXTRA_PATTERNS=()                        # warn-only 补充模式，命中须人工复核

# ===== 供应链 SBOM（--sbom）=====
# 依据：GB/T 39204-2022 7.9 j)（关基：定制开发软件源代码安全检测/检测报告，R8 §⑫）；
#       《证券期货业网络和信息安全管理办法》证监会令第 218 号 §28（知识产权保护
#       制度）与供应商合同约束要求；GB/T 43848-2024（开源代码安全评价）；
#       OWASP Top 10:2025 A03（软件供应链失效，R8 §⑨）。
# 判定：启用后 fail-closed——无工具且无 lockfile → fail；许可证块名单命中 → fail。
SBOM_REQUIRED=1
# SBOM_FORMAT 基线 conf 已定义但 precheck.sh 正文暂未消费（既有死变量，doctor warn 级）；
# 需要 SPDX（ISO/IEC 5962:2021）时在项目 conf 中自行设置：SBOM_FORMAT="spdx"；默认工具自选（CycloneDX=ECMA-424:2024，漏洞/VEX 一等公民）。
SBOM_LICENSE_BLOCKLIST=("GPL-3.0" "AGPL")   # 强 copyleft 进金融商用交付须法务评估；按机构开源政策裁剪
# SBOM_LICENSE_EXEMPTIONS 同上 §F.2 五字段格式

# ===== 交付文档包（--docs-pack）=====
# 依据：GB/T 8567-2006 §7（软件文档体系，standards-compliance.md §C）；金融项目
#       验收惯例需需求/设计/测试/部署/运维/管理六包齐备；等保三级系统安全方案设计
#       须含密码技术内容并形成配套文件（GB/T 22239-2019 三级要求，R8 §①）——
#       密码应用方案文档属人工核对项（立法文档 §3-⑤）。
# 判定：启用后 fail-closed——缺必备文档 → fail；文档含 TBD → fail（ALLOW_TBD=1 降级 warn）。
DOCS_PACK_PROFILE="gbt8567"
# gbt8567/custom 必备清单取 DOCS_PACK_REQUIRED（按项目交付范围增删；测评项目建议
# 追加 "密码应用方案" "等级保护测评报告" 并走人工核对）
DOCS_PACK_REQUIRED=("软件需求规格说明" "软件设计说明" "软件测试计划" "软件测试报告" "软件用户手册" "软件产品规格说明")

# ===== 发布签名（--release-sign，P3 批次并行落地的新门禁）=====
# 依据：NIST SP 800-218 v1.1 PS.2（提供软件发布完整性验证机制，R8 §⑧）；
#       SLSA v1.0 Build L2（托管构建平台签名 provenance，R8 §⑩）；
#       GB/T 39204-2022 7.9 f)（设计、研发、生产、交付关键环节安全管理）。
# 判定（check_release_sign 实际语义）：每个发布产物（RELEASE_ARTIFACTS_GLOB，缺省
#       dist/*.tar.gz dist/*.zip dist/*.jar）须伴随 .sig/.asc/.att/.bundle 其一，
#       缺失 → fail；cosign 可用时 verify-blob 验签，验签失败 → fail；cosign 不可用
#       降级存在性检查（warn 披露，不 fail）；未匹配到发布产物 → warn。
# 说明：若 precheck.sh 尚未合入该门禁（旧版基线），本变量为无害死变量（--doctor 仅
#       warn 提示），门禁合入后自动生效。
RELEASE_SIGN_REQUIRED=1
# 可选裁剪（默认关闭，按机构交付要求开启）：
# RELEASE_PROVENANCE_REQUIRED=1        # 另要求 SLSA provenance 文件存在（fail-closed），SLSA Build L2
# RELEASE_ARTIFACTS_GLOB="dist/*.tar.gz dist/*.zip"   # 发布产物枚举 glob（空格分隔）
# RELEASE_SIGN_TOOL="none"             # 无 cosign 环境强制存在性检查；空=auto 自动探测 cosign

# ===== 证据留痕（可选，GATE_RUNS_DIR）=====
# 依据：GB/T 28448-2019 测评单元四要素（指标→对象→实施→判定，R8 §②）；
#       金规〔2024〕24 号（数据安全审计、监督检查与评价）。
# 门禁运行记录 JSONL 落盘（ts/gate/status/ids/duration_s），金融审计取证建议开启；
# 置空=关闭，不影响任何既有输出。
GATE_RUNS_DIR=".swarm-yuan/gate-runs"

# ===== 工具链说明（无赋值，提示）=====
# 本机无 cosign/shellcheck/gitleaks/semgrep 时：SENSITIVE_TOOL/SECURITY_TOOL 保持
# "auto" 自动降级内置正则；工具路径一律用 fixture 内 mock 验证（批次铁律④）。
# 生产环境安装真实工具后用 bash precheck.sh --doctor 复核配置可达性。
