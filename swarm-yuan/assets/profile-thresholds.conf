# profile-thresholds.conf —— auto_detect_profile 阈值配置（决策 18 修订 + WP-Q2 + WP-Q3）
# 由 scripts/profile-threshold-survey.sh 统计生成（2026-07-21，默认阈值，待 survey 校准）
# 用户可按项目类型调整。WP-Q2 偏置修正：信号明确才升档，模糊走默认 standard。
#
# 阈值：文件数 P33/P67 分位数（默认值，待 profile-threshold-survey.sh 跑样本校准）
PROFILE_LITE_MAX_FILES=80
PROFILE_STANDARD_MAX_FILES=400
# 依赖数阈值（package.json dependencies + devDependencies 子键数）
PROFILE_LITE_MAX_DEPS=20
# monorepo 标志文件存在时一律 standard（不降 lite）
PROFILE_MONOREPO_FORCE_STANDARD=1
# 技术栈复杂度阈值
PROFILE_FORMS_THRESHOLD=3        # 形态数 ≥3 → standard
PROFILE_FRAMEWORKS_THRESHOLD=20  # 框架数 ≥20 → standard
