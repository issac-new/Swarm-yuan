# ===== 标准合规（--compliance/--docs-pack/--sbom/--privacy）=====
# 未配置的门禁静默跳过；SBOM/PII 启用后 fail-closed
COMPLIANCE_MATRIX_FILE=""         # 标准合规矩阵文件路径，空则探测 SKILL_DIR/references/standards-compliance.md
COMPLIANCE_REQUIRED_SECTIONS=()   # 矩阵必备锚点清单，空则用内置 6 锚点默认集
DOCS_PACK_PROFILE=""              # 文档包 profile：rusp/gbt9386/gbt8567/custom，空则跳过
DOCS_PACK_DIR=""                  # 文档包目录，空则默认 docs
DOCS_PACK_REQUIRED=()             # gbt8567/custom 必备文档清单，例：("需求规格说明书" "测试报告")
DOCS_PACK_ALLOW_TBD=0             # 设 1 时文档含 TBD 降级 warn
SBOM_REQUIRED=0                   # 设 1 启用 SBOM 生成与许可证扫描（启用后 fail-closed）
SBOM_OUTPUT_DIR=""                # SBOM 产物目录（带时间戳归档），空则默认 .sbom
SBOM_FORMAT=""                    # SBOM 格式偏好（spdx/cyclonedx），空则工具默认
SBOM_TOOL=""                      # 指定 SBOM 工具；空则按 syft→cdxgen→内置 lockfile 解析降级；"none"=屏蔽外部工具、强制内置 lockfile 解析（无工具链环境依赖）
SBOM_LICENSE_BLOCKLIST=()         # 许可证块名单，例：("GPL-3.0" "AGPL")
SBOM_LICENSE_EXEMPTIONS=()        # 豁免登记，5 字段：对象|规则|理由|审批人|日期
PRIVACY_SCAN_DIRS=()              # PII 扫描目录，空则跳过；配置后目录全不存在则 fail
PRIVACY_EXTRA_PATTERNS=()         # 额外 PII ERE 模式
PRIVACY_SENSITIVE_KEYWORDS=()     # 敏感关键词（固定串），例：("身份证号" "银行卡号")
PRIVACY_EXEMPTIONS=()             # 豁免登记，5 字段：对象|规则|理由|审批人|日期

# ===== 安全门禁族深化（--authz/--requirements/--crypto + 工具链降级）=====
# 未配置静默跳过；授权/密评启用后 fail-closed；需求执法项由开关打开（默认 0，EARS 恒 warn-only）
SENSITIVE_TOOL="auto"             # 敏感信息扫描工具：auto=有 gitleaks 用 gitleaks 否则内置正则；builtin=强制内置；gitleaks=强制 gitleaks（未装/执行失败自动降级内置）
SECURITY_TOOL="auto"              # 安全扫描工具：auto=有 semgrep 用 semgrep（--config auto --json，ERROR 级命中 fail）否则内置；builtin=强制内置；semgrep=强制 semgrep（未装/执行失败自动降级内置）
AUTHZ_SCAN_DIRS=()                # 授权类弱点（CWE-862/863/639/284）扫描目录，空则跳过；缺鉴权注解/IDOR/CORS 放行带凭据 → fail
AUTHZ_EXTRA_PATTERNS=()           # 额外授权风险 ERE 模式（warn-only，须人工复核），例：("@Anonymous")
REQUIREMENTS_STRICT=0             # 设 1 时 spec 含 TBD/待定/待明确 → fail（ISO/IEC/IEEE 29148 需求集无待定项）
REQUIREMENTS_ID_REQUIRED=0        # 设 1 时需求条目缺 REQ- 唯一编号 → fail（29148 每条需求唯一标识）
CRYPTO_PROFILE=""                 # 密码合规 profile：空=跳过；gm=GB/T 39786-2021 密评（弱算法 MD5/SHA1/DES/RSA-1024/ECDSA → fail；国密白名单 SM2/SM3/SM4）
CRYPTO_SCAN_DIRS=()               # 密码算法扫描目录（profile=gm 时生效；启用但留空则 warn 披露 fail-open 风险）

# ===== 门禁工具化（--format json / gate-runs 证据落盘，P1-4/P1-5）=====
# GATE_RUNS_DIR 非空时，每门禁执行后向其下 gate-runs.jsonl 追加一行 JSONL
#（ts/gate/status/ids/duration_s，UTC 时间戳；对齐 GB/T 15532 过程文档与
#  standards-compliance.md §F 证据列）。默认空 = 关闭，不影响任何既有输出。
GATE_RUNS_DIR=""                    # 例：".swarm-yuan/gate-runs"
# 附：--format json 的 SARIF 子集结果默认打印到 stdout 末尾；
#     也可用环境变量 GATE_JSON_OUT 指定落盘文件（环境变量而非 conf 变量，避免机器相关路径入库）。
