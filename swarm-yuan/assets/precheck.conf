# precheck.conf — precheck.sh 核心配置（WP-I 物理三分：core/arch/compliance）
# 生成目标技能时，把此文件复制到 .claude/skills/<skill>/scripts/ 并按项目实际填充。
# precheck.sh 启动时自动 source 本文件（若存在）；本文件末尾按存在性 source 两个兄弟：
#   precheck.arch.conf       架构 17 门禁 + 框架适配变量（standard 及以上 profile）
#   precheck.compliance.conf 合规 9 门禁变量（compliance profile / 强监管交付）
# lite profile 只有本文件（核心 10 门禁所需变量）。

# ===== 基础配置（核心 10 门禁）=====
PROJECT_DIR="<项目根绝对路径>"
BRANCH_REGEX='^(feat|fix|refactor)/.+'
PROTECTED_BRANCHES=("main")
WRITABLE_DIRS=("<可改目录1>" "<可改目录2>")
READONLY_DIRS=("<只读目录1>")
TEST_CMD="<test 命令>"
BUILD_CMD="<build 命令>"
SCAN_DIRS=("<扫描敏感信息的目录>")
CONSISTENCY_DIRS=("<扫描业务规则/勾稽的目录>")

# ===== 核心门禁工具链（--sensitive/--security 属核心 10，工具开关随核心档）=====
SENSITIVE_TOOL="auto"             # 敏感信息扫描工具：auto=有 gitleaks 用 gitleaks 否则内置正则；builtin=强制内置；gitleaks=强制 gitleaks（未装/执行失败自动降级内置）
SECURITY_TOOL="auto"              # 安全扫描工具：auto=有 semgrep 用 semgrep（--config auto --json，ERROR 级命中 fail）否则内置；builtin=强制内置；semgrep=强制 semgrep（未装/执行失败自动降级内置）

# ===== 门禁工具化（--format json / gate-runs 证据落盘，P1-4/P1-5）=====
# GATE_RUNS_DIR 非空时，每门禁执行后向其下 gate-runs.jsonl 追加一行 JSONL
#（ts/gate/status/ids/duration_s，UTC 时间戳；对齐 GB/T 15532 过程文档与
#  standards-compliance.md §F 证据列）。默认空 = 关闭，不影响任何既有输出。
GATE_RUNS_DIR=""                    # 例：".swarm-yuan/gate-runs"
# 附：--format json 的 SARIF 子集结果默认打印到 stdout 末尾；
#     也可用环境变量 GATE_JSON_OUT 指定落盘文件（环境变量而非 conf 变量，避免机器相关路径入库）。

# ===== profile 分层（WP-I）：兄弟配置存在即加载 =====
# precheck.sh 的 conf 加载以 set +u 包裹本文件，兄弟 source 继承同一语义；
# BASH_SOURCE 定位本文件所在目录，三平台兼容（bash 3.2 可用）。
_conf_self_dir="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
[[ -f "$_conf_self_dir/precheck.arch.conf" ]] && source "$_conf_self_dir/precheck.arch.conf"
[[ -f "$_conf_self_dir/precheck.compliance.conf" ]] && source "$_conf_self_dir/precheck.compliance.conf"
