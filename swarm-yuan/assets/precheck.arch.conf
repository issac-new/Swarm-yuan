# precheck.arch.conf — 架构 17 门禁 + 框架适配配置（WP-I 物理三分）
# 由 precheck.conf 末尾按存在性 source；standard 及以上 profile 骨架包含本文件。

# ===== DDD / 分层门禁（--layer/--stable-diff/--link-depth）=====
LAYER_DEFS=()                    # 例：("presentation=src/controllers/**" "domain=src/domain/**")
LAYER_ORDER=()                   # 例：("presentation" "application" "domain" "infrastructure")
DOMAIN_LAYER=""                  # 例："domain"
DOMAIN_FORBIDDEN_IMPORTS=("react" "express" "@nestjs" "sequelize" "typeorm" "prisma" "mongoose" "koa" "fastify" "axios" "node:fs" "node:http" "node:net" "org.springframework" "org.apache.ibatis" "com.baomidou.mybatisplus" "org.apache.shardingsphere" "javax.persistence" "jakarta.persistence")
STABLE_GLOBS=()                  # 例：("src/domain/**" "src/repositories/**")
AGGREGATE_DIR=""                 # 例："src/domain/aggregates"
MAX_LINK_DEPTH=0                 # 例：6

# ===== 依赖版本（--deps）=====
CODEBASE_REF=""
SPEC_FILE=""

# ===== TOGAF 架构契约（--adr/--contract/--consistency-cross/--impact）=====
ADR_DIR=""                       # 例："docs/adr"
TECH_DEBT_FILE=""                # 例："docs/TECH_DEBT.md"
CONTRACT_DIR=""                  # 例："docs/contracts"
ACL_DIR=""                       # 例："src/acl"
CONTEXT_DIRS=()                  # 例：("src/contexts/order" "src/contexts/shipping")
GLOSSARY_FILE=""                 # 例："docs/glossary.md"
SOR_FILE=""                      # 例："docs/data-ownership.md"
IMPACT_SPEC_FILE=""

# ===== 微服务架构（--service/--api）=====
SERVICE_DIRS=()                  # 例：("services/order" "services/payment")
SHARED_LIBS_DIR=""               # 例："packages/shared"
DB_CONFIG_FILES=()               # 例：("services/order/config/db.yml" "services/payment/config/db.yml")
API_GATEWAY=""                   # 例："services/gateway"
MAX_SYNC_CHAIN=0                 # 例：3
API_SPEC_DIR=""                  # 例："docs/api"
WRITE_HANDLER_DIRS=()            # 例：("services/order/src/handlers")

# ===== 前端架构（--state/--frontend）=====
STORE_DIR=""                     # 例："src/store"
MAX_STORE_LINES=0                # 例：300
COMPONENT_DIR=""                 # 例："src/components"
MAX_COMPONENT_DEPTH=0            # 例：7
MAX_PROPS_COUNT=0                # 例：7
BUNDLE_REPORT=""                 # 例："dist/bundle-report.html"
STYLE_DIR=""                     # 例："src/styles"

# ===== 认知门禁（--cognition）=====
COGNITION_BASELINE=""            # 例："docs/cognition-baseline.md"
COGNITION_MAP=""
COG_SPEED_FILES=10
COG_CUMULATIVE_TODO=20
COG_STRENGTH_FANIN=8

# ===== 左移门禁（--shift-left：测试左移+变更左移+运维监控左移）=====
# 测试左移：spec 含测试设计段 + test 先于 impl 提交
TEST_DESIGN_FILE=""              # spec 文件路径（校验含 §19 测试左移段）。默认同 SPEC_FILE
TEST_DIR_PATTERNS=()             # 测试文件 glob 模式，例：("**/__tests__/**/*.test.ts" "**/*.spec.ts")
IMPL_DIR_PATTERNS=()             # 实现文件 glob 模式，例：("src/**/*.ts")，用于覆盖率 gap 检测
# 变更左移：plan 含变更影响段 + 回滚预案 + 迁移兼容
CHANGE_IMPACT_FILE=""            # plan 文件路径（校验含 §20 变更左移段）。默认同 plan-template
ROLLBACK_KEYWORDS="回滚\|revert\|rollback\|灰度\|canary\|feature.flag\|功能开关"
MIGRATION_DIRS=()                # 数据库迁移目录，例：("migrations" "prisma/migrations")
BREAKING_DDL_PATTERNS="DROP TABLE\|DROP COLUMN\|TRUNCATE\|RENAME TABLE"
# 运维监控左移：spec 含可观测性段 + 代码埋点 + 健康检查
OBSERVABILITY_FILE=""            # spec 文件路径（校验含 §21 可观测性约束段）。默认同 SPEC_FILE
METRIC_ENDPOINTS=()              # 须埋点的 metric 名，例：("http_requests_total" "request_duration_seconds")
METRIC_CODE_PATTERNS="metrics\.\|counter\.\|gauge\.\|histogram\.\|prometheus\|statsd\|emitMetric\|recordMetric"
LOG_CODE_PATTERNS="logger\.\|console\.\(log\|warn\|error\)\|winston\|pino\|log4j\|logging\.\|@Slf4j\|@Log\|log\.\(info\|warn\|error\|debug\)"
TRACE_CODE_PATTERNS="traceId\|spanId\|openTelemetry\|@Trace\|@Span\|tracer\."
HEALTH_CHECK_URLS=()             # 健康检查端点 URL，例：("http://localhost:8080/health" "http://localhost:8080/ready")
HEALTH_CHECK_TIMEOUT=3           # 健康检查超时秒数

# ===== 框架适配（约定式命名：<RULESET_ID>_<VAR>，RULESET_ID 全大写、连字符转下划线）=====
# 每个激活框架的变量由对应门禁片段头注释 requires_conf 声明；
# --inject-frameworks 注入时自动核对缺失变量并注入占位 + warn。
# ===== 框架适配（由 §C+.0.5 探查结果填充，只填激活的框架）=====
ACTIVE_FRAMEWORKS=()              # 探查到的框架列表，例：("spring-boot" "mybatis" "lombok" "sharding" "spring-batch" "dubbo" "rocketmq")
# MyBatis 框架感知
MYBATIS_MAPPER_DIRS=()            # MyBatis XML mapper 目录，例：("src/main/resources/mapper")
MYBATIS_SRC_GLOBS=()              # MyBatis 源码 glob，例：("src/main/java/**/*.java")
SQL_INJECTION_WHITELIST=()        # 已知安全的 ${} 白名单，例：("ORDER BY ${orderBy}" "tableName${suffix}")
# Lombok 框架感知
LOMBOK_ANNOTATIONS="@Data|@Slf4j|@Builder|@Getter|@Setter|@RequiredArgsConstructor"
LOMBOK_SRC_GLOBS=()               # Lombok 源码 glob，例：("src/main/java/**/*.java")
# ShardingSphere 框架感知
SHARDING_KEY_COLUMNS=()           # 分片键列名，例：("user_id" "order_id")
SHARDED_TABLES=()                 # 分片表名，例：("t_order" "t_order_item")
SHARDING_BROADCAST_TABLES=()      # 广播表名，例：("t_config" "t_dict")
# Spring Batch 框架感知
SPRING_BATCH_JOB_DIRS=()          # Spring Batch Job/Step 定义目录
# JVM 构建文件
JAVA_BUILD_FILES=()               # 例：("pom.xml" "build.gradle")

# --- Java 核心 ---
# Spring Boot 框架感知
SPRINGBOOT_SRC_GLOBS=()           # 例：("src/main/java/**/*.java")
SPRINGBOOT_CONFIG_FILES=()        # 例：("src/main/resources/application.yml" "src/main/resources/application.properties")
# Spring Cloud 框架感知
SPRINGCLOUD_SRC_GLOBS=()
# Spring Security 框架感知
SPRINGSEC_SRC_GLOBS=()
# Spring Data JPA 框架感知
SPRINGJPA_SRC_GLOBS=()
# MapStruct 框架感知
MAPSTRUCT_SRC_GLOBS=()
# Validation（hibernate-validator）框架感知
VALIDATION_SRC_GLOBS=()
# Jackson 框架感知
JACKSON_SRC_GLOBS=()
# JUnit5 + Mockito 框架感知
JUNIT_SRC_GLOBS=()                # 例：("src/test/java/**/*.java")

# --- Java 分布式/中间件 ---
# Dubbo 框架感知
DUBBO_SRC_GLOBS=()
# Seata 框架感知
SEATA_SRC_GLOBS=()
# Sentinel 框架感知
SENTINEL_SRC_GLOBS=()
# Nacos 框架感知
NACOS_SRC_GLOBS=()
NACOS_CONFIG_GLOBS=()
# XXL-Job 框架感知
XXLJOB_SRC_GLOBS=()
# Elasticsearch 框架感知
ES_SRC_GLOBS=()
# Netty 框架感知
NETTY_SRC_GLOBS=()

# --- 数据集成/流计算 ---
# Kettle（PDI ETL）框架感知
KETTLE_JOB_GLOBS=()               # 例：("**/*.ktr" "**/*.kjb")
# Flink 框架感知
FLINK_SRC_GLOBS=()
# Paimon 框架感知
PAIMON_SRC_GLOBS=()
PAIMON_TABLE_GLOBS=()

# --- MQ/缓存/调度 ---
# RocketMQ 框架感知
ROCKETMQ_SRC_GLOBS=()
# Kafka 框架感知
KAFKA_SRC_GLOBS=()
# RabbitMQ 框架感知
RABBITMQ_SRC_GLOBS=()
# Redis 框架感知
REDIS_SRC_GLOBS=()
# Quartz 框架感知
QUARTZ_SRC_GLOBS=()
# ElasticJob 框架感知
ELASTICJOB_SRC_GLOBS=()

# --- 数据库 ---
# MySQL 框架感知
MYSQL_SQL_GLOBS=()                # 例：("**/*.sql")
MYSQL_SCHEMA_GLOBS=()
# PostgreSQL 框架感知
PGSQL_SQL_GLOBS=()
PGSQL_SCHEMA_GLOBS=()
# SQL Server 框架感知
MSSQL_SQL_GLOBS=()
MSSQL_SCHEMA_GLOBS=()

# --- Node 后端 ---
# Express 框架感知
EXPRESS_SRC_GLOBS=()
# Koa 框架感知
KOA_SRC_GLOBS=()
KOA_SOCKETIO_FILE_GLOBS=()       # Socket.IO 文件 glob（socketio 随 koa 合并管理），例：("src/**/*.ts")
KOA_SOCKETIO_NAMESPACE_REQUIRED="" # 设 "1" 强制须用 namespace 隔离，空则不检
KOA_SOCKETIO_FORBIDDEN_BARE_SOCKET="" # 裸 socket.on 禁用正则，空则不检；例："socket\.on\("
# NestJS 框架感知
NEST_SRC_GLOBS=()
# Fastify 框架感知
FASTIFY_SRC_GLOBS=()
# TypeORM 框架感知
TYPEORM_SRC_GLOBS=()
# Prisma 框架感知
PRISMA_SRC_GLOBS=()
PRISMA_SCHEMA_GLOBS=()            # 例：("prisma/schema.prisma")

# --- Python ---
# Django 框架感知
DJANGO_SRC_GLOBS=()
# Flask 框架感知
FLASK_SRC_GLOBS=()
# FastAPI 框架感知
FASTAPI_SRC_GLOBS=()
# SQLAlchemy 框架感知
SQLALCHEMY_SRC_GLOBS=()
# Celery 框架感知
CELERY_SRC_GLOBS=()
# Pytest 框架感知
PYTEST_TEST_GLOBS=()              # 例：("tests/**/*.py" "**/*_test.py")

# --- Go ---
# Gin 框架感知
GIN_SRC_GLOBS=()
# GORM 框架感知
GORM_SRC_GLOBS=()

# --- 前端核心 ---
# Vue 框架感知
VUE_FILE_GLOBS=()                 # 例：("src/**/*.vue")
VUE_REQUIRE_SCRIPT_SETUP=""       # 设 "1" 强制 <script setup>，空则不强制
VUE_FORBIDDEN_OPTIONS_API=""      # Options API 禁用正则，空则不检；例："data\s*\(\s*\)\s*\{|methods\s*:"
VUE_VHTML_SANITIZE_REQUIRED=""    # 设 "1" 强制 v-html 须配 sanitize，空则不强制
VUE_VHTML_SANITIZE_PATTERNS=""    # sanitize 模式正则，空则跳过；例："DOMPurify\.sanitize|escapeHtml"
VUE_VFOR_FORBIDDEN_INDEX_KEY=""   # v-for 禁用 index 作 key 正则，空则不检
VUE_REACTIVE_WARN_THRESHOLD=""    # reactive 调用数 warn 阈值，空则不检；例："5"
VUE_PINIA_FILE_GLOBS=()           # Pinia store 文件 glob（pinia 随 vue 合并管理），例：("src/stores/**/*.ts")
VUE_PINIA_DEFINESTORE_REQUIRED="" # 设 "1" 强制须用 defineStore，空则不检
VUE_PINIA_AGGREGATE_STORE=""      # 聚合层 store 文件路径，空则不检；例："src/stores/index.ts"
# React 框架感知
REACT_SRC_GLOBS=()                # 例：("src/**/*.jsx" "src/**/*.tsx")
# Angular 框架感知
ANGULAR_SRC_GLOBS=()              # 例：("src/**/*.ts")
# Next.js 框架感知
NEXTJS_SRC_GLOBS=()
# Nuxt 框架感知
NUXT_SRC_GLOBS=()

# --- 前端 UI/工程 ---
# Element Plus 框架感知
ELEMENT_SRC_GLOBS=()
# Ant Design 框架感知
ANTD_SRC_GLOBS=()
# Naive UI 框架感知
NAIVEUI_FILE_GLOBS=()
# Vite 框架感知
VITE_CONFIG_FILE=""               # vite 配置文件路径，空则跳过；例："vite.config.ts"
VITE_INJECT_SCRIPT=""             # 注入脚本路径，空则跳过
# Webpack 框架感知
WEBPACK_CONFIG_GLOBS=()           # 例：("webpack.config.*")
# Tailwind 框架感知
TAILWIND_CONFIG_GLOBS=()          # 例：("tailwind.config.*")

# --- 前端测试 ---
# Jest / Vitest 框架感知
VITEST_CONFIG_GLOBS=()            # 例：("vitest.config.*" "vite.config.*")
VITEST_TEST_GLOBS=()              # 例：("**/*.test.ts" "**/*.spec.ts")
VITEST_CONFIG_FILE=""             # 单一配置文件路径（检 include custom 入口），空则跳过；例："vitest.config.ts"
VITEST_FORBIDDEN_UPSTREAM_TEST="" # 禁 upstream 测试正则（ncwk 仓库契约），空则不检；例："^./upstream/.*\.test\.ts$"
