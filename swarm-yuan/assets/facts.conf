# facts.conf —— swarm-yuan 口径单一事实源（WP-P1）
#
# 所有"40 门禁 / 27+13 / 151 变量 / 16 特征卡 / 11 运行时 / 32 领域 / 13 步流程 / 62 框架"
# 等 catchphrase 的权威数字源。变更这里 = 变更全局口径。
#
# 用法：
#   - bash 可 source（KEY=value 格式，无空格、无 declare -A）
#   - self-check.sh check_doc_consistency 读本文件做权威断言
#   - 文档头部引用行指向本文件（assets/facts.conf）
#
# 变更流程：
#   1. 改本文件
#   2. 跑 `bash scripts/self-check.sh` 验证文档口径一致（漂移检测会列出未同步的文档）
#   3. 按提示同步文档叙事层的数字
#
# 真值来源（机械计数，不写死）：
#   - 门禁数 = precheck.sh ^check_[a-z_]+\(\) 计数
#   - conf 变量数 = precheck.conf + precheck.arch.conf + precheck.compliance.conf 合计 ^[A-Z_]...= 计数
#   - 框架数 = references/frameworks/*.md（不含 _template）
#   - references 数 = references/*.md（不含 frameworks/ 子目录）

# ===== 门禁（precheck.sh）=====
FACT_GATES_TOTAL=40           # check_* 顶层函数总数（WP-S1 +dengbao/pia/sast-deep/oss-eval）
FACT_GATES_CORE=10            # ALL_GATES_CORE
FACT_GATES_ARCH=17            # ALL_GATES_FULL − CORE − COMPLIANCE
FACT_GATES_COMPLIANCE=13      # ALL_GATES_COMPLIANCE（WP-S1 9+4）
FACT_GATES_STANDARD=27        # ALL_GATES_STANDARD = CORE + ARCH（--all-full 执行序列）

# ===== 配置变量（precheck.conf 三件套合计）=====
# WP-P3 后：arch.conf 移除 38 个无示例空占位 <FW>_SRC_GLOBS（懒生成），
# 合计 179 → 142（懒生成机制由 --inject-frameworks 按 ACTIVE_FRAMEWORKS 自动补占位；WP-R A4 +DRUID_CONFIG_FILES）
# WP-S1 后：142 → 151（+DENGBAO×3/PIA×2/SAST_DEEP×2/OSS_EVAL×1/STANDARDS_MAP_FILE×1）
FACT_CONF_VARS=151            # core + arch + compliance 三文件合计 ^[A-Z_]...=
FACT_CONF_VARS_CORE=12        # precheck.conf
FACT_CONF_VARS_ARCH=100       # precheck.arch.conf（懒生成后；WP-R A4 +DRUID_CONFIG_FILES）
FACT_CONF_VARS_COMPLIANCE=39  # precheck.compliance.conf（WP-S1 30+9）

