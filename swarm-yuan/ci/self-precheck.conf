# ci/self-precheck.conf —— 生成器仓库自举门禁配置（三档：--all/--all-full/--compliance-suite）
# 用法：运行前由 sed 把 __REPO_ROOT__ 替换为仓库根绝对路径（同 tests/e2e/run-e2e.sh 的 __DEMO__ 模式），
#       与 assets/precheck.sh + gates-*.sh 放同一临时目录后执行。
# 断言目标：precheck.sh 三档对生成器仓库 RC=0（CI generator-self-gate Job 逐档断言）。
# 口径权威源：assets/facts.conf（FACT_BOOTSTRAP_GATES=3）
PROJECT_DIR="__REPO_ROOT__"
BRANCH_REGEX='^(feat|fix|refactor|docs|chore|test)/.+'
PROTECTED_BRANCHES=("main")

# WRITABLE_DIRS 可安全配置：domain/shift-left/impact 的代码扫描全带扩展名白名单
# （--include='*.ts' '*.js' '*.py' '*.go' '*.java'），bash/md 文件不会被扫描命中。
# 配置收益：impact 的 md 兜底搜索与 shift-left 埋点扫描有真实目标，从"跳过"变"实跑 pass"。
WRITABLE_DIRS=("swarm-yuan/scripts" "swarm-yuan/assets" "swarm-yuan/references")

# SCAN_DIRS 必须保持空：sensitive 门禁用内置正则全文件类型扫描，范式仓库的门禁脚本/规则集 md
# 含 password\s*[=:]、token 正则等模式字面量，必误报（已知误报面，不在自举闭环内启用）。
SCAN_DIRS=()

# SPEC_FILE/CHANGE_IMPACT_FILE 显式指向自家模板：impact 门（gates-warn.sh:616-617）在候选路径
# + 兜底搜索全空时 fail——生成器仓库 cwd 下模板相对路径不可达（_first_existing_file 用 cwd
# 相对路径），必须 conf 显式配置指向 swarm-yuan/assets/spec-template.md/plan-template.md 自证 pass。
SPEC_FILE="__REPO_ROOT__/swarm-yuan/assets/spec-template.md"
CHANGE_IMPACT_FILE="__REPO_ROOT__/swarm-yuan/assets/plan-template.md"

# 合规 13 门（sbom/privacy/authz/requirements/crypto/rtm/dengbao/pia/sast-deep/oss-eval/
# release-sign/compliance/docs-pack）：未配置项 skip_if_unconfigured 静默跳过，不阻塞 RC；
# 已配置项按需显式声明。
# WP-S1：新合规门禁（dengbao/pia/sast-deep/oss-eval）对生成器仓库保持未配置 SKIP——
# SKIP 透明化（Task 2）后跳过清单在汇总段显式披露；生成器自身无等保/PIA 交付场景，不强启。
STANDARDS_MAP_FILE=""   # 留空走默认探测 assets/standards-map.conf，自举核验映射表格式
# 构建/测试类变量（BUILD_CMD/TEST_CMD）不配置：check_build/check_test 打印"跳过"直接 return——
# bash+md 项目的正确姿态。
