# ci/self-precheck.conf —— 生成器仓库自举门禁最小配置（CI generator-self-gate Job 专用）
# 用法：运行前由 sed 把 __REPO_ROOT__ 替换为仓库根绝对路径（同 tests/e2e/run-e2e.sh 的 __DEMO__ 模式），
#       与 assets/precheck.sh 放同一临时目录后执行 `bash precheck.sh --all`。
# 最小化原则：
#   - 只声明项目根与分支规范；构建/测试/扫描目录类变量不配置——对应门禁按既有设计跳过或 warn，
#     warn 不影响 RC。本 Job 的断言目标是「生成器对自家仓库跑 --all 全链路 RC=0」（自举闭环）。
#   - SCAN_DIRS/WRITABLE_DIRS 刻意留空：对范式仓库全量扫描会命中门禁脚本自身的模式字面量
#     （如 password/token 检测正则、SQL 关键字片段），属已知误报面，不在最小闭环内启用。
PROJECT_DIR="__REPO_ROOT__"
BRANCH_REGEX='^(feat|fix|refactor)/.+'
PROTECTED_BRANCHES=("main")
