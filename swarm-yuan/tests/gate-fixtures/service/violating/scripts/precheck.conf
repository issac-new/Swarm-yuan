# service fixture (violating)：两服务 DB 配置指向同一库 → fail（共享数据库反模式）；
# 同步调用数 >MAX_SYNC_CHAIN + 无 traceId 透传 + 无网关 → warn 佐证（不改变退出码来源，退出码由 fail 决定）
PROJECT_DIR="__REPO_ROOT__"
SERVICE_DIRS=("services/user-service" "services/order-service")
DB_CONFIG_FILES=("services/user-service/db.conf" "services/order-service/db.conf")
MAX_SYNC_CHAIN=1
