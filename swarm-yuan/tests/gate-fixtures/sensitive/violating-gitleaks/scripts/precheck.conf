# sensitive fixture (violating-gitleaks)：mock gitleaks 走工具路径，检出 sk- 密钥 → gate_sensitive_gitleaks
# PATH 注入走 conf（precheck 自身 source，环境生效）；runner 的 setup 钩子在子 shell 执行、环境不回传，
# 故 setup.sh 只负责生成 bin/gitleaks mock 脚本（仿 sbom fixture 的 node_modules mock 模式）。
PROJECT_DIR="__REPO_ROOT__"
export PATH="__REPO_ROOT__/bin:$PATH"
SENSITIVE_TOOL="auto"
SCAN_DIRS=("src")
