# link-depth fixture (compliant-warn-deep-chain)：8 个纯转发函数堆叠（链路膨胀信号）
# 现语义 warn-only：纯转发堆叠仅触发 warn「疑似纯转发函数」，退出码仍为 0——
# 按 sensitive/compliant 先例以 expect-output 断言 warn 文案，目录名以 compliant 开头匹配退出码期望。
