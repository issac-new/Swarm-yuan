# frontend fixture (violating)：组件嵌套深 + props 过多 → warn；循环依赖 → fail（退出码来源）
# madge mock：conf 注入 shell 函数（command -v 与执行均函数优先于 PATH，装有真 madge 的机器亦被确定性遮蔽），
# 输出契约模拟 madge 检出循环依赖（含 circular 字样），使既有「madge 报 circular → fail」分支在无 madge
# 机器上可复现 exercise；仅借 conf 扩展点供给工具输出，门禁判定语义与输出行一字未改。
PROJECT_DIR="__REPO_ROOT__"
COMPONENT_DIR="src/components"
MAX_COMPONENT_DEPTH=3
MAX_PROPS_COUNT=5
madge() {
  printf '%s\n' '✖ Found 2 circular dependencies!' '1) src/components/A.tsx > src/components/B.tsx' '2) src/components/B.tsx > src/components/A.tsx'
  return 0
}
