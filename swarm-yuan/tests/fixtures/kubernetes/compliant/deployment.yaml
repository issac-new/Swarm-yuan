# compliant fixture deployment.yaml:
#  - image: nginx@sha256 → fw_kubernetes_latest_image pass
#  - 无 privileged → fw_kubernetes_privileged pass
#  - runAsNonRoot: true → fw_kubernetes_run_as_root pass
#  - Secret 走引用（envFrom）→ fw_kubernetes_hardcoded_secret pass
#  - resources.limits → fw_kubernetes_no_resource_limits pass
#  - livenessProbe + readinessProbe → fw_kubernetes_no_probes pass
#  - namespace: production → fw_kubernetes_default_namespace pass
#  - NetworkPolicy 存在 → fw_kubernetes_no_network_policy pass
#  - PodDisruptionBudget 存在 → fw_kubernetes_no_pdb pass
#  - imagePullPolicy: IfNotPresent → fw_kubernetes_image_pull_policy pass
#
# 期望：kubernetes fixture compliant → 退出码 == 0（PASS）

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: web
          image: nginx@sha256:2f4c1f2a1c8e3e8a1b9c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - secretRef:
                name: db-creds
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Secret
metadata:
  name: db-creds
  namespace: production
type: Opaque
data:
  password: U3VwM3JTZWNyZXQh
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-policy
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-pdb
  namespace: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: web
