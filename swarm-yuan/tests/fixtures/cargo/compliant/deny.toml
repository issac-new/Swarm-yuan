# compliant fixture deny.toml（cargo-deny 许可证配置）
# → fw_cargo_license_check pass
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
]
confidence-threshold = 0.8

[advisories]
db-path = "~/.cargo/advisory-db"
