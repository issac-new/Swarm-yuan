syntax = "proto3";

package helloworld.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "example.com/kratos-fixture/api/helloworld/v1;v1";

// Greeter 违规触发点①：含 google.api.http 注解但代码缺 RegisterGreeterHTTPServer
service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply) {
    option (google.api.http) = {
      get: "/helloworld/{name}"
    };
  }
}

message HelloRequest {
  // 违规触发点②：声明 validate.rules 但服务端未挂 validate.Validate() 中间件
  string name = 1 [(validate.rules).string = {min_len: 1, max_len: 64}];
}

message HelloReply {
  string message = 1;
}
