# precheck.conf — vue fixture (violating: v-html 无 sanitize → fw_vue_vhtml_sanitize fail 主触发；v-for 用 index 作 key → warn)
PROJECT_DIR="__REPO_ROOT__/swarm-yuan/tests/fixtures/vue/violating"
ACTIVE_FRAMEWORKS=("vue")
VUE_FILE_GLOBS=("__REPO_ROOT__/swarm-yuan/tests/fixtures/vue/violating/**/*.vue")
VUE_REQUIRE_SCRIPT_SETUP="1"
VUE_FORBIDDEN_OPTIONS_API="export default \{[^}]*\b(data|methods|computed)\b"
VUE_VHTML_SANITIZE_REQUIRED="1"
VUE_VHTML_SANITIZE_PATTERNS="DOMPurify|sanitize-html|xss\("
VUE_VFOR_FORBIDDEN_INDEX_KEY="v-for[^>]*:key=\"(index|i)\""
VUE_REACTIVE_WARN_THRESHOLD="999"
